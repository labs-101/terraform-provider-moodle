name: testing

on:
  push:
    
jobs:
  testing:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run Tests
        env: 
            MOODLE_TOKEN: ${{ secrets.MOODLE_TOKEN }}
            TF_ACC: "1"
        run: go test -v ./...
